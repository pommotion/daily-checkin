name: daily-checkin

on:
  schedule:
    # 每天北京时间 08:00（UTC 00:00）
    - cron: '7 0 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run checkin
        env:
          # ===== 站点 Secret（curl_bash 整段）=====
          HITUN_CURL_BASH: ${{ secrets.HITUN_CURL_BASH }}
          RENZHE_CURL_BASH: ${{ secrets.RENZHE_CURL_BASH }}
          LISTENHUB_FREE_CURL_BASH: ${{ secrets.LISTENHUB_FREE_CURL_BASH }}
          LISTENHUB_PRO_CURL_BASH: ${{ secrets.LISTENHUB_PRO_CURL_BASH }}
          # ===== 推送配置 =====
          PUSH_METHOD: ${{ secrets.PUSH_METHOD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          WXPUSHER_SPT: ${{ secrets.WXPUSHER_SPT }}
          SERVERCHAN_SPT: ${{ secrets.SERVERCHAN_SPT }}
        run: |
          python main.py
